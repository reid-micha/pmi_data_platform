  <script >
/* Micah — 2026 US Senate sample data.

 *   inc          — incumbent party 'R' | 'D'
 *   incName      — short label (incumbent, "(ret.)" if retiring, "(special)" if appointed)
 *   matchup      — short candidate matchup string for the row body
 *   probR        — market-implied probability the seat goes Republican (0-100)
 *   d14          — 14-day Δ in probR (signed)
 *   volume       — $ traded in the past day across the holding contracts
 *   contracts    — count of component contracts

 *

    // ---- Likely R (75-89) ----
    { state: 'AK', inc: 'R', incName: 'Sullivan',           matchup: 'Sullivan (R) vs. Galvin (D)',          probR: 88, d14: -1.1, volume: 22000,  contracts: 14, excs: ['kalshi','polymarket','metaculus'] },

    { state: 'ME', inc: 'R', incName: 'Collins',            matchup: 'Collins (R) vs. Mills (D)',            probR: 46, d14: -1.0, volume:221000,  contracts: 87, excs: ['kalshi','polymarket','metaculus','manifold','predictit'], marquee: true },

    // ---- Lean D (26-40) ----
    { state: 'MN', inc: 'D', incName: 'Smith (ret.)',       matchup: 'Flanagan (D) vs. Schultz (R)',         probR: 36, d14: +0.9, volume: 64000,  contracts: 38, excs: ['kalshi','polymarket','metaculus'] },
    { state: 'VA', inc: 'D', incName: 'Warner',             matchup: 'Warner (D) vs. Youngkin (R)',          probR: 28, d14: +3.1, volume: 92000,  contracts: 42, excs: ['kalshi','polymarket','metaculus','manifold'] },

    // ---- Likely D (11-25) ----
    { state: 'CO', inc: 'D', incName: 'Hickenlooper',       matchup: 'Hickenlooper (D) vs. Ganahl (R)',      probR: 18, d14: +0.4, volume: 51000,  contracts: 28, excs: ['kalshi','polymarket'] },
    { state: 'NJ', inc: 'D', incName: 'Booker',             matchup: 'Booker (D) — no major challenger',     probR: 14, d14: -0.2, volume: 22000,  contracts: 16, excs: ['kalshi','polymarket'] },
    { state: 'NM', inc: 'D', incName: 'Luján',              matchup: 'Luján (D) — no major challenger',      probR: 22, d14: +0.1, volume: 14000,  contracts: 11, excs: ['kalshi'] },

    // ---- Safe D (<= 10) ----
    { state: 'DE', inc: 'D', incName: 'Coons',              matchup: 'Coons (D) — no major challenger',      probR:  6, d14:  0.0, volume:  9000,  contracts: 6,  excs: ['kalshi'] },
    { state: 'IL', inc: 'D', incName: 'Durbin (ret.)',      matchup: 'Krishnamoorthi (D) vs. open R',        probR: 10, d14: -0.4, volume: 38000,  contracts: 23, excs: ['kalshi','polymarket','manifold'] },
    { state: 'MA', inc: 'D', incName: 'Markey',             matchup: 'Markey (D) — no major challenger',     probR:  5, d14:  0.0, volume: 12000,  contracts: 9,  excs: ['kalshi'] },
    { state: 'OR', inc: 'D', incName: 'Merkley',            matchup: 'Merkley (D) — no major challenger',    probR: 14, d14: +0.2, volume: 13000,  contracts: 10, excs: ['kalshi'] },

  ];

  // -------- categorize --------
  // probR thresholds (mirrors PMI heat scale bands)
  function bandOf(p) {
    if (p <= 10) return 'safe-d';
    if (p <= 25) return 'likely-d';
    if (p <= 40) return 'lean-d';
    if (p <  60) return 'tossup';
    if (p <  75) return 'lean-r';
    if (p <  90) return 'likely-r';
    return 'safe-r';
  }
  races.forEach(r => r.band = bandOf(r.probR));

  // -------- pre-2026 holdover seats (NOT on the ballot this cycle) --------
  // Senate 2024 → R 53, D 47.  Of those, our races include 21 R and 13 D up for re-election.
  // Therefore holdover R = 53 - 21 = 32, holdover D = 47 - 13 = 34.
  const holdover = { R: 32, D: 34 };

  // -------- seat balance counts (all 100 seats, including holdover) --------
  const counts = { 'safe-d':0, 'likely-d':0, 'lean-d':0, 'tossup':0, 'lean-r':0, 'likely-r':0, 'safe-r':0 };
  races.forEach(r => { counts[r.band] += 1; });
  counts['safe-d'] += holdover.D;
  counts['safe-r'] += holdover.R;

  // Bookkeeping: "in the bag" totals (everything except tossup, attributed to expected winner)
  const dSecured =
    counts['safe-d'] + counts['likely-d'] + counts['lean-d'];
  const rSecured =
    counts['safe-r'] + counts['likely-r'] + counts['lean-r'];
  const tossups = counts['tossup'];

  // -------- top-line PMI for the Senate index --------
  // Aggregate prob of R holding 51+ seats — derived in pmi-model from individual race probs
  // (we hard-code an illustrative number here so the design works standalone).
  const pmiGOPMajority = 84.2;
  const pmiDemMajority = 15.8;

  // 14-day series of P(R ≥ 51) — climbs slightly over the window
  const series14 = (window.MICAH && window.MICAH.makeSeries)
    ? window.MICAH.makeSeries(7, 84, 73)
    : Array.from({length:28}, (_,i) => 73 + (84-73) * (i/27));

  // Top toss-up rail (sorted by closest-to-50)
  const tossupRail = races
    .filter(r => r.band === 'tossup')
    .slice()
    .sort((a,b) => Math.abs(a.probR - 50) - Math.abs(b.probR - 50));

  // Marquee table-rows (rendered as PMIRows beneath the chart)
  const marquee = races.filter(r => r.marquee).slice().sort((a,b) => Math.abs(a.probR - 50) - Math.abs(b.probR - 50));

  // Map of state -> probR for the choropleth (states without a 2026 race omitted)
  const raceByState = Object.fromEntries(races.map(r => [r.state, r]));
  const probByState = Object.fromEntries(races.map(r => [r.state, r.probR]));

  return {
    races,
    raceByState,
    probByState,
    counts,
    holdover,
    dSecured,
    rSecured,
    tossups,
    pmiGOPMajority,
    pmiDemMajority,
    series14,
    tossupRail,
    marquee,
    bandOf,
  };
})();

</script>
  <script >
/* PMI Model — REAL Polymarket War Index data (wired 2026-05-30).
   Source: pmi-api /indexes/polymarket-war-index/score over live ingest.
   Headline pmiScore = REAL aggregator output (47.1078) across 181 components
   (universe: 449 war markets selected from 18682 live-ingested markets).
   Contracts below = top 13 LLM-confirmed (directly_about_war=1, real gpt-4o-mini)
   components by 24h volume, with real last_price (yes) + real volume.
   NOTE: cond{} = empty — real conditional-impact matrix not yet computed (TODO E2E-UI-2);
   brier = proxy from real LLM confidence (1-conf)^2 — real brier needs resolution history (TODO). */

window.PMI_MODEL = (function () {
  const contracts = [

  // Anchor stops drawn from CSS vars (kept in JS for SVG fills)
  const stops = [
    [0,   [22, 52, 138]],   // #16348A deep dem
    [15,  [45, 91, 204]],   // #2D5BCC
    [30,  [111, 143, 219]], // #6F8FDB
    [45,  [184, 197, 227]], // #B8C5E3
    [50,  [233, 226, 220]], // #E9E2DC neutral
    [55,  [236, 201, 207]], // #ECC9CF
    [70,  [220, 139, 149]], // #DC8B95
    [85,  [181, 55, 71]],   // #B53747
    [100, [139, 30, 45]],   // #8B1E2D deep rep
  ];
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (v >= stops[i][0] && v <= stops[i+1][0]) { lo = stops[i]; hi = stops[i+1]; break; }
  }
  const t = (v - lo[0]) / (hi[0] - lo[0] || 1);
  const c = lo[1].map((x, i) => Math.round(x + (hi[1][i] - x) * t));

/* US Map + Time Chart — D3 powered, React rendered */

const { useEffect: _useEffect, useRef: _useRef, useState: _useState, useMemo: _useMemo } = React;

// ---------- USA Map ----------
function UsaMap({ width = 720, height = 460, onSelect, focusedState,
                  dataByCode = null, dimMissing = false, tipFormatter = null }) {
  const [topo, setTopo] = _useState(null);
  const [hover, setHover] = _useState(null);
  const M = window.MICAH;

  _useEffect(() => {

    // falls outside the land (concave shapes / panhandles / island states).

    const offsets = {
      FL: [22, 22],   // shift label SE into the peninsula
      MI: [12, 22],   // lower peninsula

      MD: [10, 4],    // skinny eastern arm — nudge right
      ID: [0, 8],     // top tapers — nudge down

    'North Carolina':'NC','North Dakota':'ND','Ohio':'OH','Oklahoma':'OK','Oregon':'OR',

    'Tennessee':'TN','Texas':'TX','Utah':'UT','Vermont':'VT','Virginia':'VA',
    'Washington':'WA','West Virginia':'WV','Wisconsin':'WI','Wyoming':'WY',

// ---------- Time Chart (14-day PMI line) ----------
function TimeChart({ data = [], width = 720, height = 460, color = '#3A4C6A', yLabel = 'PMI Score', noData = false, plain = false }) {
  const padding = { top: 30, right: 40, bottom: 50, left: 60 };
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const maxY = 100;
  const minY = 0;

  const xStep = data.length > 1 ? innerW / (data.length - 1) : 0;
  const points = data.map((v, i) => [padding.left + i * xStep, padding.top + innerH - (v - minY) / (maxY - minY) * innerH]);

  const linePath = points.length ? `M ${points.map(p => p.join(',')).join(' L ')}` : '';

  const yTicks = [0, 20, 40, 60, 80, 100];

  return (
    <div className="time-chart">
      <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
        {/* Y-axis ticks + horizontal grid */}
        {yTicks.map(t => {
          const y = padding.top + innerH - (t / maxY) * innerH;
          return (
            <g key={t}>
              <line x1={padding.left} x2={width - padding.right} y1={y} y2={y}
                stroke="#E1DCD0" strokeWidth="1" />
              <text x={padding.left - 12} y={y + 4} textAnchor="end"
                fontSize="11" fill="#6B7180" fontFamily="Inter, sans-serif">

        {!noData && (
          <path d={linePath} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />

  <script type="text/babel">
/* AskView — the AI-native counter-design.
   Keeps Micah brand DNA (serif, warm paper, heat scale, exchange chips)
   but rebuilds interaction around natural-language Q&A, AI-synthesized
   narratives, citation chips, and AI-surfaced spotlights. */

const { useState: askState, useEffect: askEffect, useRef: askRef } = React;

// ---------- AI helper — wraps window.claude.complete with safe fallback ---
async function askClaude(prompt, fallback) {
  try {
    if (!window.claude || !window.claude.complete) return fallback;
    const out = await window.claude.complete(prompt);
    return (out || '').trim() || fallback;
  } catch (e) {
    console.warn('claude failed', e);
    return fallback;
  }
}

// ---------- Streaming-text effect (reveals tokens word by word) ----------
function useStreamingText(text, speedMs = 18) {
  const [out, setOut] = askState('');
  askEffect(() => {
    setOut('');
    if (!text) return;
    const words = text.split(/(\s+)/);  // keep whitespace
    let i = 0;
    const id = setInterval(() => {
      i += 1;
      setOut(words.slice(0, i).join(''));
      if (i >= words.length) clearInterval(id);
    }, speedMs);
    return () => clearInterval(id);
  }, [text]);
  return out;
}

// ---------- Sparkle icon (the "AI" mark — used very sparingly) ----------
function Sparkle({ size = 16, color = 'currentColor' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden>
      <path d="M12 3 L13.6 9.2 L20 11 L13.6 12.8 L12 19 L10.4 12.8 L4 11 L10.4 9.2 Z" fill={color}/>
      <path d="M19 3 L19.8 5.4 L22 6 L19.8 6.6 L19 9 L18.2 6.6 L16 6 L18.2 5.4 Z" fill={color} opacity=".55"/>
    </svg>
  );
}

// ---------- Live thinking dots ----------
function ThinkingDots() {
  return (
    <span className="thinking-dots" aria-label="thinking">
      <span></span><span></span><span></span>
    </span>
  );
}

// ---------- Cited contract chip (small footnote-style citation) ----------
function CiteChip({ n, exc, label, onClick }) {
  return (
    <button className="cite-chip" onClick={onClick} title={label}>
      <sup className="cite-chip__n">[{n}]</sup>
      <ExchangeChip id={exc} size={18} />
      <span className="cite-chip__label">{label}</span>
    </button>
  );
}

// ---------- Probability dial — heat-scaled radial gauge ----------
function ProbDial({ value = 50, size = 140, label = 'Composite probability' }) {
  const r = size / 2 - 10;
  const c = 2 * Math.PI * r;
  const off = c * (1 - value / 100);
  const color = window.heatColor(value);
  const sw = 14;
  return (
    <div className="prob-dial" style={{ width: size, height: size }}>
      <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} stroke="var(--surface-rule)" strokeWidth={sw} fill="none" />
        <circle cx={size/2} cy={size/2} r={r}
          stroke={color} strokeWidth={sw} fill="none"
          strokeDasharray={c} strokeDashoffset={off}
          strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{ transition: 'stroke-dashoffset 0.8s cubic-bezier(.2,.7,.2,1), stroke .8s' }} />
      </svg>
      <div className="prob-dial__center">
        <div className="prob-dial__value">{Math.round(value)}<small>%</small></div>
        <div className="prob-dial__label">{label}</div>
      </div>
    </div>
  );
}

// ---------- Confidence bar ----------
function ConfidenceBar({ low, mid, high }) {
  const minV = Math.max(0, Math.min(low, high) - 6);
  const maxV = Math.min(100, Math.max(low, high) + 6);
  const span = maxV - minV;
  const lp = ((low - minV) / span) * 100;
  const hp = ((high - minV) / span) * 100;
  const mp = ((mid - minV) / span) * 100;
  return (
    <div className="conf-bar">
      <div className="conf-bar__head t-label">
        <span>{low}%</span>
        <span style={{ fontWeight: 600, color: 'var(--ink-1)' }}>{mid}% est.</span>
        <span>{high}%</span>
      </div>
      <div className="conf-bar__track">
        <div className="conf-bar__band" style={{ left: lp + '%', width: (hp - lp) + '%' }} />
        <div className="conf-bar__mark" style={{ left: mp + '%' }} />
      </div>
      <div className="conf-bar__foot t-label">90% confidence interval · derived from 4 sources</div>
    </div>
  );
}

// ---------- Today brief block (the editorial opener) ----------
function TodayBrief() {
  const [headline, setHeadline] = askState('Markets pull right as gubernatorial bets concentrate in three Sun-Belt races.');
  const [lead, setLead] = askState(
    'The National MAGA Index closed at 93 yesterday — its highest reading in 14 days — pushed up by a surge in Texas and Florida governor contracts. Contrarian volume is consolidating around a single Georgia third-party question. Recession contracts on Kalshi remain flat.'
  );
  const [loading, setLoading] = askState(false);

  async function regen() {
    setLoading(true);
    const h = await askClaude(
      'In one short editorial sentence (under 18 words, no quotes), write the lead headline for a prediction-market dashboard on May 28, 2026. The MAGA Index is 93, near its 14-day high, with Texas and Florida governor contracts driving the rise.',
      headline
    );
    const l = await askClaude(
      'In 2-3 short editorial sentences, summarize today on a prediction-market aggregator: MAGA Index 93 (14d high), driven by TX & FL governor contracts; volume consolidating in a Georgia third-party question; Kalshi recession contracts flat. Neutral analytical tone. Plain text, no markdown.',
      lead
    );
    setHeadline(h); setLead(l); setLoading(false);
  }

  const streamedH = useStreamingText(headline, 14);
  const streamedL = useStreamingText(lead, 10);

  return (
    <div className="brief">
      <div className="brief__head">
        <span className="t-eyebrow">TODAY · MAY 28 · LIVE</span>
        <button className="text-btn" onClick={regen} disabled={loading}>
          <Sparkle size={12} /> {loading ? 'Regenerating…' : 'Regenerate'}
        </button>
      </div>
      <h1 className="brief__head-line t-display">{streamedH}</h1>
      <p className="brief__lead t-body">{streamedL}</p>
      <div className="brief__sources">
        <span className="t-label" style={{ marginRight: 8 }}>Synthesized from</span>
        <ExchangeStack ids={['polymarket','kalshi','robinhood','metaculus','coinbase']} extras={6} size={20} />
      </div>
    </div>
  );
}

// ---------- The Composer (the AI prompt input) ----------
function Composer({ onSubmit, busy }) {
  const [val, setVal] = askState('');
  const examples = [
    'How likely is a recession before Q4 2026?',
    'Will Trump pardon any Jan 6 defendants this year?',
    'Build a Sun-Belt governors index',
    'What moved the MAGA Index in the last week?',
  ];
  function go(q) {
    if (busy) return;
    const t = (q ?? val).trim();
    if (!t) return;
    setVal(t);
    onSubmit(t);
  }

function AnswerCard({ question, onClose }) {
  const [phase, setPhase] = askState('thinking');  // thinking | ready | error
  const [data, setData] = askState(null);
  const [followups, setFollowups] = askState([]);

  askEffect(() => {
    let alive = true;
    setPhase('thinking'); setData(null); setFollowups([]);

    (async () => {
      // Ask Claude for a structured JSON answer
      const prompt = `You are Micah, a prediction-markets aggregator. The user asked: "${question}".
Respond ONLY with strict JSON (no prose, no markdown fences). The schema is:
{
  "title": "<a short rephrased headline-form version of the question, max 14 words>",
  "probability": <integer 0-100, the composite likelihood>,
  "low": <integer 0-100>, "high": <integer 0-100>,  // a 90% CI band
  "summary": "<one-paragraph 60-90 word neutral analytical summary in plain prose>",
  "drivers": [ "<short driver 1 (under 14 words)>", "<driver 2>", "<driver 3>" ],

}
The "exc" field must be one of: polymarket, kalshi, robinhood, metaculus, coinbase, manifold, predictit.
Be analytical and neutral. Do not invent specific real-person quotes.`;

      const fallback = JSON.stringify({
        title: 'Composite likelihood for the user question',
        probability: 38, low: 28, high: 49,
        summary: 'Aggregated market signal suggests modest probability. Direct contracts on Polymarket and Kalshi are trading in the high-30s, while indirect contracts on Metaculus skew slightly lower. Volume is concentrated in a small number of high-conviction contracts, so the composite reading is somewhat sensitive to single-source moves.',
        drivers: [

        followups: [
          'How has the probability moved over the last 14 days?',
          'Which contract has the highest single-source weight?',
          'What would need to happen for this to cross 50%?'
        ]
      });

      const raw = await askClaude(prompt, fallback);
      if (!alive) return;
      let parsed = null;
      try { parsed = JSON.parse(raw); }
      catch { try { parsed = JSON.parse(raw.match(/\{[\s\S]*\}/)[0]); } catch { parsed = JSON.parse(fallback); } }
      // ensure ints
      parsed.probability = Math.max(0, Math.min(100, Math.round(parsed.probability || 50)));
      parsed.low  = Math.max(0, Math.min(100, Math.round(parsed.low  ?? parsed.probability - 10)));
      parsed.high = Math.max(0, Math.min(100, Math.round(parsed.high ?? parsed.probability + 10)));
      setData(parsed);
      setFollowups(parsed.followups || []);
      setPhase('ready');
    })();

    return () => { alive = false; };
  }, [question]);

  const summary = useStreamingText(data?.summary || '', 8);

  return (
    <div className="answer">
      <div className="answer__head">

          <Sparkle size={14} color="var(--ink-3)" />

{

const rFmt = {
  px:  v => (v * 100).toFixed(1) + '¢',
  pxF: v => (v * 100).toFixed(2) + '¢',
  pp:  v => (v >= 0 ? '+' : '') + (v * 100).toFixed(1) + 'pp',
};

function brierFill(v) {
  const t = Math.max(0, Math.min(1, (v - 0.05) / 0.27));
  const stops = [
    [0,    [22, 52, 138]],    [0.25, [111, 143, 219]],
    [0.50, [233, 226, 220]],  [0.75, [220, 139, 149]], [1.00, [139, 30, 45]],
  ];
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i][0] && t <= stops[i+1][0]) { lo = stops[i]; hi = stops[i+1]; break; }
  }
  const u = (t - lo[0]) / (hi[0] - lo[0] || 1);
  const c = lo[1].map((x, i) => Math.round(x + (hi[1][i] - x) * u));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

  const [overlays, setOverlays] = rState({ fair: true, polls: true, events: true, edge: true });
  const w = 980, h = 380;
  const pad = { l: 60, r: 78, t: 16, b: 50 };
  const inner = { w: w - pad.l - pad.r, h: h - pad.t - pad.b };
  const { market, fair, polls } = RESEARCH_DATA.series;
  const allMin = Math.min(...market, ...fair, ...polls) - 0.02;
  const allMax = Math.max(...market, ...fair, ...polls) + 0.02;
  const range = allMax - allMin;
  const xStep = inner.w / (market.length - 1);
  const px2y = v => pad.t + inner.h - ((v - allMin) / range) * inner.h;
  const idx2x = i => pad.l + i * xStep;
  const line = (arr) => 'M ' + arr.map((v, i) => idx2x(i) + ',' + px2y(v)).join(' L ');

  const last = { m: market.at(-1), f: fair.at(-1) };
  const edgeNow = last.f - last.m;

  const [hover, setHover] = rState(null);

  return (
    <div className="rd2-pane">
      <div className="rd2-pane__head">
        <div>
          <h3 className="t-h3" style={{margin:0}}>14-day implied probability</h3>
          <p className="t-body-sm" style={{margin:'4px 0 0',color:'var(--ink-3)'}}>
            Market price is the canonical observation. Toggle overlays to compare.
          </p>
        </div>
        <div className="rd2-overlays">
          {[
            { k:'fair',   label:'Micah Fair', dot:'#1A3FA8' },
            { k:'polls',  label:'Polls',      dot:'#6B7180', dash: true },
            { k:'edge',   label:'Edge band',  dot:'rgba(26,63,168,.25)' },
            { k:'events', label:'News events',dot:'#11192C', circle: true },
          ].map(o => (
            <label key={o.k} className={`rd2-overlay ${overlays[o.k] ? 'is-on' : ''}`}>
              <input type="checkbox" checked={overlays[o.k]}
                     onChange={e => setOverlays({...overlays, [o.k]: e.target.checked})} />
              <span className={`rd2-overlay__dot ${o.dash ? 'is-dash' : ''} ${o.circle ? 'is-circle' : ''}`} style={{background: o.dot}} />
              {o.label}
            </label>
          ))}
        </div>
      </div>

      <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="rd2-svg">
        {/* grid */}
        {[0, 0.25, 0.5, 0.75, 1].map(t => {
          const y = pad.t + t * inner.h;
          return (
            <g key={t}>
              <line x1={pad.l} x2={w - pad.r} y1={y} y2={y} stroke="#E1DCD0" strokeWidth="1" />
              <text x={pad.l - 10} y={y + 3} fontSize="11" textAnchor="end" fill="#6B7180" fontFamily="Inter">
                {((allMax - t * range) * 100).toFixed(0)}¢
              </text>
            </g>
          );
        })}
        {[0, 15, 30, 45, 59].map(i => (
          <text key={i} x={idx2x(i)} y={h - 28} fontSize="11" fill="#6B7180" textAnchor="middle" fontFamily="Inter">
            T-{60 - i}d
          </text>
        ))}

        {/* edge band */}
        {overlays.edge && overlays.fair && (
          <path
            d={line(market) + ' L ' + idx2x(market.length - 1) + ',' + px2y(fair[fair.length - 1])
              + ' L ' + [...fair].reverse().map((v, i) => idx2x(fair.length - 1 - i) + ',' + px2y(v)).join(' L ') + ' Z'}
            fill={edgeNow > 0 ? 'rgba(26,63,168,.10)' : 'rgba(139,30,45,.10)'}
          />
        )}

        {/* event markers */}
        {overlays.events && RESEARCH_DATA.events.map((ev, i) => {
          const x = idx2x(ev.x);
          const color = ev.pol === 'up' ? '#1A3FA8' : ev.pol === 'down' ? '#8B1E2D' : '#6B7180';
          return (
            <g key={i} onMouseEnter={() => setHover({ x, y: pad.t + 6, ev })} onMouseLeave={() => setHover(null)}
               style={{cursor:'pointer'}}>
              <line x1={x} x2={x} y1={pad.t + 14} y2={pad.t + inner.h} stroke={color} strokeWidth="1" strokeDasharray="2 3" opacity=".4" />
              <circle cx={x} cy={pad.t + 6} r={4} fill={color} />
            </g>
          );
        })}

        {/* lines */}
        {overlays.polls && <path d={line(polls)} fill="none" stroke="#6B7180" strokeWidth="1.5" strokeDasharray="5 4" opacity=".9" />}
        {overlays.fair  && <path d={line(fair)}  fill="none" stroke="#1A3FA8" strokeWidth="1.8" />}
        <path d={line(market)} fill="none" stroke="#11192C" strokeWidth="2.4" />

        {/* last labels */}
        {[{v:last.m,c:'#11192C'}].concat(overlays.fair ? [{v:last.f,c:'#1A3FA8'}] : []).map((p,i) => (
          <g key={i}>
            <rect x={w - pad.r + 6} y={px2y(p.v) - 10} width={pad.r - 12} height={20} fill={p.c} rx="3" />
            <text x={w - pad.r + 13} y={px2y(p.v) + 4} fontSize="11" fontWeight="700" fill="#FBFAF6" fontFamily="Inter">
              {rFmt.px(p.v)}
            </text>
          </g>
        ))}

        {hover && (
          <g>
            <rect x={Math.min(hover.x + 8, w - 240)} y={hover.y + 6} width={230} height={28}
                  fill="#FBFAF6" stroke="#C9C3B5" rx="3" />
            <text x={Math.min(hover.x + 16, w - 232)} y={hover.y + 25} fontSize="12" fill="#11192C" fontFamily="Inter">
              {hover.ev.label}
            </text>
          </g>
        )}
      </svg>
    </div>
  );
}

</script>
  <script type="text/babel">
/* Option A — Research Desk · ANALYST DENSITY MODE
   Refactored for the PMI model: every contract is Yes/No.
   Hero shows P(Yes), P(No), weight in PMI, and resolution swing on PMI score. */

const { useState: aaState, useEffect: aaEffect, useMemo: aaMemo } = React;

// ============================================================
// Extra analyst data — time series, supplementary stats
// ============================================================
const ANALYST_DATA = (() => {
  // Volume time series (60d)
  const volume = Array.from({length: 60}, (_, i) =>
    Math.round(1.4e6 + Math.sin(i * 0.6) * 4e5 + Math.cos(i * 1.7) * 2.5e5 + (i > 47 ? 9e5 : 0))
  );
  // Spread (bid/ask) basis points
  const spreadBp = Array.from({length: 60}, (_, i) =>
    14 + Math.sin(i * 0.3) * 5 + Math.cos(i * 0.8) * 3
  );

  // Yes-side price (60d) for each contract, seeded by current yes prob.
  function yesSeries(sym, base) {
    const seed = sym.split('').reduce((s, c) => s + c.charCodeAt(0), 0);
    return Array.from({length: 60}, (_, i) => {
      const v = base + Math.sin((seed + i) * 0.4) * 0.035 + Math.cos((seed + i) * 1.1) * 0.012 + (i / 60) * 0.015;
      return Math.max(0.04, Math.min(0.96, v));
    });
  }
  // Micah Fair (small drift away from market)
  function fairSeries(sym, base) {
    const seed = sym.split('').reduce((s, c) => s + c.charCodeAt(0), 0);
    return Array.from({length: 60}, (_, i) => {
      const v = base + 0.015 + Math.sin((seed + i) * 0.35) * 0.02;
      return Math.max(0.04, Math.min(0.96, v));
    });
  }
  // Polls CI half-width
  const pollsCi = Array.from({length: 60}, (_, i) =>
    0.022 + Math.abs(Math.sin(i * 0.5)) * 0.014
  );

  // Analogous prior cycles for each contract (used by Analogues tab).
  // Stable, deterministic.
  function analoguesFor(sym) {
    const seed = sym.charCodeAt(0) + sym.charCodeAt(sym.length - 1);
    const labels = ['2022 cycle','2018 cycle','2014 cycle','2010 cycle','2006 cycle','2002 cycle','1998 cycle','1994 cycle'];
    return labels.map((l, i) => {
      const mktAt = 0.5 + Math.sin((seed + i) * 1.1) * 0.18;
      const resolvedYes = mktAt + 0.06 + Math.sin((seed + i) * 1.7) * 0.12;
      const error = resolvedYes - mktAt;
      return {
        label: l,
        mktAt: +mktAt.toFixed(3),
        resolved: resolvedYes > 0.5 ? 'Yes' : 'No',
        error: +error.toFixed(3),
        n: Math.round(140 + Math.cos(seed + i) * 90),
        brier: +(0.08 + Math.abs(Math.sin(seed + i)) * 0.06).toFixed(3),
      };
    });
  }

  // Reliability diagram for calibration
  const reliability = Array.from({length: 10}, (_, i) => {
    const bin = (i + 0.5) / 10;
    const observed = Math.max(0, Math.min(1, bin + (Math.sin(i * 1.3) * 0.06 - 0.03)));
    const n = Math.round(140 - Math.abs(i - 5) * 18 + Math.cos(i) * 8);
    return { bin, observed, n };
  });

  // Depth/slippage curve per venue
  const depth = [
    { exc: 'polymarket', curve: [0, 5, 12, 24, 42, 68, 105] },
    { exc: 'kalshi',     curve: [0, 7, 16, 31, 54, 88, 138] },
    { exc: 'robinhood',  curve: [0, 9, 22, 45, 80, 132, 210] },
    { exc: 'manifold',   curve: [0, 18, 48, 110, 220, 410, 720] },
  ];

  return { volume, spreadBp, pollsCi, yesSeries, fairSeries, analoguesFor, reliability, depth };
})();

// ============================================================
// HeroPMI — the canonical hero used by Analyst & Microstructure
// ============================================================
function HeroPMI({ sym, density = 'editorial' }) {
  const M = window.PMI_MODEL;
  const c = M.bySym[sym];
  if (!c) return null;
  const contrib = M.contribTo(sym);
  const tone = (v) => v > 0 ? 'pos' : v < 0 ? 'neg' : 'flat';

  const base = [
    { label: 'P(Yes)',           v: (c.yes * 100).toFixed(1) + '¢', sub: 'market implied', tone: 'yes' },
    { label: 'P(No)',            v: ((1 - c.yes) * 100).toFixed(1) + '¢', sub: 'complement', tone: 'no' },
    { label: 'Weight in PMI',    v: c.w + '%', sub: M.pmiName, tone: 'fair' },
    { label: 'Contribution',     v: (contrib.total * 100).toFixed(2) + 'pp', sub: `raw ${(contrib.raw*100).toFixed(2)} + cond ${contrib.cond >= 0 ? '+' : ''}${(contrib.cond*100).toFixed(2)}` },
  ];
  const extra = [
    { label: 'PMI swing · Yes',  v: '+' + (contrib.swingYes * 100).toFixed(2) + 'pp', sub: 'if resolves YES', tone: 'pos' },
    { label: 'PMI swing · No',   v: (contrib.swingNo * 100).toFixed(2) + 'pp', sub: 'if resolves NO', tone: 'neg' },
    { label: 'Volume 24h',       v: '$' + (c.vol / 1e6).toFixed(2) + 'M', sub: '+18% vs 7d avg' },
    { label: 'Open interest',    v: '$' + (c.vol * 1.7 / 1e6).toFixed(1) + 'M', sub: '12,840 contracts' },
    { label: 'Spread',           v: '14bp', sub: ((c.yes - 0.001) * 100).toFixed(1) + ' / ' + ((c.yes + 0.001) * 100).toFixed(1) },
    { label: 'Days to resolve',  v: '187', sub: 'Nov 04, 2026' },
    { label: 'Brier (lifetime)', v: c.brier.toFixed(3), sub: 'vs cat. 0.21' },
    { label: 'Influences',       v: M.influenceesOf(sym).length + ' / ' + M.influencersOf(sym).length, sub: 'out / in (conditional)' },
  ];
  const list = density === 'analyst' ? [...base, ...extra] : base;

  return (
    <div className={`rd2-hero rd2-hero--pmi rd2-hero--${density}`}>
      {list.map((cell, i) => (
        <div key={i} className={`rd2-hero__cell ${cell.tone ? 'rd2-hero__cell--' + cell.tone : ''}`}>
          <div className="t-label">{cell.label}</div>
          <div className="rd2-hero__v">{cell.v}</div>
          <div className="t-label" style={{color:'var(--ink-3)'}}>{cell.sub}</div>
        </div>
      ))}
    </div>
  );
}

// ============================================================
// Yes/No question banner — sits above the hero
// ============================================================
function QuestionBanner({ sym }) {
  const c = window.PMI_MODEL.bySym[sym];
  if (!c) return null;
  return (
    <div className="rd2-question">
      <div className="rd2-question__q">{c.q}</div>
      <div className="rd2-question__bar">
        <span className="rd2-question__bar-yes" style={{width: (c.yes * 100) + '%'}}>
          {(c.yes * 100).toFixed(0)}% YES
        </span>
        <span className="rd2-question__bar-no" style={{width: ((1 - c.yes) * 100) + '%'}}>
          {((1 - c.yes) * 100).toFixed(0)}% NO
        </span>
      </div>
    </div>
  );
}

// ============================================================
// PriceDense — Yes line + No (mirror) + Micah Fair + spread + volume
// ============================================================
function PriceDense({ sym, density }) {
  const c = window.PMI_MODEL.bySym[sym];
  const yes = ANALYST_DATA.yesSeries(sym, c.yes);
  const fair = ANALYST_DATA.fairSeries(sym, c.yes);
  const no = yes.map(v => 1 - v);

  const w = 980, h = 460;
  const pad = { l: 60, r: 78, t: 16, b: 130 };
  const innerH = h - pad.t - pad.b;
  const innerW = w - pad.l - pad.r;
  const xStep = innerW / (yes.length - 1);
  const px2y = v => pad.t + innerH - v * innerH;  // y axis is full 0..1
  const idx2x = i => pad.l + i * xStep;
  const line = (arr) => 'M ' + arr.map((v, i) => idx2x(i) + ',' + px2y(v)).join(' L ');

  const { volume, spreadBp } = ANALYST_DATA;
  const maxVol = Math.max(...volume);
  const volH = 80;
  const volTop = h - pad.b + 14;

  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="rd2-svg">
      {/* Yes / No mid line at 50% */}
      <line x1={pad.l} x2={w - pad.r} y1={px2y(0.5)} y2={px2y(0.5)} stroke="#C9C3B5" strokeWidth="1" strokeDasharray="4 4" />
      <text x={pad.l - 10} y={px2y(0.5) + 3} fontSize="10" textAnchor="end" fill="#6B7180" fontFamily="Inter">50%</text>

      {/* gridlines */}
      {[0, 0.25, 0.5, 0.75, 1].map(t => (
        <g key={t}>
          <line x1={pad.l} x2={w - pad.r} y1={pad.t + t * innerH} y2={pad.t + t * innerH}
                stroke="#E1DCD0" strokeWidth="1" />
          <text x={pad.l - 10} y={pad.t + t * innerH + 3} fontSize="11" textAnchor="end" fill="#6B7180" fontFamily="Inter">
            {((1 - t) * 100).toFixed(0)}¢
          </text>
        </g>
      ))}

      {/* spread band around Yes */}
      {density === 'analyst' && (
        <path d={'M ' + yes.map((v, i) => idx2x(i) + ',' + px2y(v + spreadBp[i] / 10000)).join(' L ')
              + ' L ' + [...yes].reverse().map((v, i) =>
                  idx2x(yes.length - 1 - i) + ',' + px2y(v - spreadBp[yes.length - 1 - i] / 10000)
                ).join(' L ') + ' Z'}
              fill="rgba(17,25,44,.10)" />
      )}

      {/* Micah fair (yes prob, model-adjusted) */}
      <path d={line(fair)} fill="none" stroke="#1A3FA8" strokeWidth="1.8" strokeDasharray="6 3" />

      {/* No (mirror) line */}
      <path d={line(no)} fill="none" stroke="#8B1E2D" strokeWidth="2.4" />
      {/* Yes line */}
      <path d={line(yes)} fill="none" stroke="#1A3FA8" strokeWidth="2.4" />

      {/* End labels */}
      {[
        { v: yes.at(-1),  c: '#1A3FA8', l: 'Yes' },
        { v: no.at(-1),   c: '#8B1E2D', l: 'No' },
        { v: fair.at(-1), c: '#1A3FA8', l: 'Fair', dash: true },
      ].map((p, i) => (
        <g key={i}>
          <rect x={w - pad.r + 6} y={px2y(p.v) - 10} width={pad.r - 12} height={20} fill={p.dash ? '#FBFAF6' : p.c} stroke={p.c} rx="3" />
          <text x={w - pad.r + 13} y={px2y(p.v) + 4} fontSize="11" fontWeight="700" fill={p.dash ? p.c : '#FBFAF6'} fontFamily="Inter">
            {p.l} {(p.v * 100).toFixed(1)}¢
          </text>
        </g>
      ))}

      {/* volume bars (analyst only) */}
      {density === 'analyst' && volume.map((v, i) => {
        const bh = (v / maxVol) * volH;
        const x = idx2x(i) - xStep * 0.36;
        return <rect key={i} x={x} y={volTop + (volH - bh)} width={xStep * 0.72} height={bh} fill="#11192C" opacity=".25" />;
      })}
      {density === 'analyst' && (
        <text x={pad.l - 10} y={volTop + 12} fontSize="10" textAnchor="end" fill="#6B7180" fontFamily="Inter">VOL 24h</text>
      )}

      {[0, 15, 30, 45, 59].map(i => (
        <text key={i} x={idx2x(i)} y={h - 12} fontSize="11" fill="#6B7180" textAnchor="middle" fontFamily="Inter">
          T-{60 - i}d
        </text>
      ))}
    </svg>
  );
}

// ============================================================
// AnaloguesDense — reframed: prior cycles where this same Yes/No question resolved
// ============================================================
function AnaloguesDense({ sym, density }) {
  const all = ANALYST_DATA.analoguesFor(sym);
  const rows = density === 'analyst' ? all : all.slice(0, 4);
  const errors = all.map(a => a.error);
  const mean = errors.reduce((s, v) => s + v, 0) / errors.length;
  const std = Math.sqrt(errors.reduce((s, v) => s + (v - mean) ** 2, 0) / errors.length);
  const maxErr = Math.max(...rows.map(a => Math.abs(a.error)), 0.001);
  const yesCount = all.filter(a => a.resolved === 'Yes').length;

  // density histogram
  const bins = 10;
  const lo = -0.4, hi = 0.4;
  const hist = Array(bins).fill(0);
  all.forEach(a => { const i = Math.min(bins - 1, Math.max(0, Math.floor((a.error - lo) / (hi - lo) * bins))); hist[i]++; });
  const maxH = Math.max(...hist, 1);

  return (
    <div className="rd2-pane">
      <div className="rd-summary-row">
        <div><span className="t-label">Analogues</span><strong>{all.length}</strong></div>
        <div><span className="t-label">Resolved Yes</span><strong>{yesCount} / {all.length}</strong></div>
        <div><span className="t-label">Mean error</span><strong>{mean >= 0 ? '+' : ''}{(mean * 100).toFixed(1)}pp</strong></div>
        <div><span className="t-label">Std dev</span><strong>{(std * 100).toFixed(1)}pp</strong></div>
        <div><span className="t-label">Inference</span><strong>{mean > 0.05 ? 'Yes-side underpriced' : mean < -0.05 ? 'Yes-side overpriced' : 'Calibrated'}</strong></div>
      </div>

      {density === 'analyst' && (
        <div className="rd-dist">
          <div className="t-label" style={{marginBottom:8}}>ERROR DISTRIBUTION · {all.length} ANALOGUES</div>
          <svg viewBox="0 0 800 120" preserveAspectRatio="none" className="rd-dist__svg">
            {hist.map((cnt, i) => {
              const x = (i / bins) * 800;
              const bw = 800 / bins - 4;
              const bh = (cnt / maxH) * 90;
              return <rect key={i} x={x + 2} y={100 - bh} width={bw} height={bh} fill="#1A3FA8" opacity=".55" />;
            })}
            <line x1={((0 - lo) / (hi - lo)) * 800} x2={((0 - lo) / (hi - lo)) * 800} y1={6} y2={108} stroke="#11192C" strokeDasharray="3 3" />
            <text x={((0 - lo) / (hi - lo)) * 800 + 6} y={18} fontSize="10" fill="#11192C" fontFamily="Inter">zero error</text>
            <line x1={((mean - lo) / (hi - lo)) * 800} x2={((mean - lo) / (hi - lo)) * 800} y1={6} y2={108} stroke="#8B1E2D" strokeWidth="2" />
            <text x={((mean - lo) / (hi - lo)) * 800 + 6} y={32} fontSize="10" fill="#8B1E2D" fontWeight="700" fontFamily="Inter">
              μ {mean >= 0 ? '+' : ''}{(mean*100).toFixed(0)}pp
            </text>
            {[-0.4, -0.2, 0, 0.2, 0.4].map(v => (
              <text key={v} x={((v - lo) / (hi - lo)) * 800} y={117} fontSize="9" fill="#6B7180" textAnchor="middle" fontFamily="Inter">
                {v >= 0 ? '+' : ''}{(v * 100).toFixed(0)}pp
              </text>
            ))}
          </svg>
        </div>
      )}

      <div className="rd-table rd-table--dense">
        <div className="rd-table__row rd-table__row--head rd-table__row--analog">
          <span>Cycle</span><span>Market @ T-180</span><span>Resolved</span><span>Error</span>
          {density === 'analyst' && <span>n</span>}
          {density === 'analyst' && <span>Brier</span>}
          <span>Distribution</span>
        </div>
        {rows.map((a, i) => (
          <div key={a.label + i} className="rd-table__row rd-table__row--analog">
            <span className="rd-analogue__label">
              <strong>{a.label}</strong>
              <span className="t-body-sm" style={{color:'var(--ink-3)'}}>{window.PMI_MODEL.bySym[sym].q.slice(0, 38)}…</span>
            </span>
            <span className="rd-table__num">{(a.mktAt * 100).toFixed(1)}¢</span>
            <span className="rd-resolved">
              <span className="rd-resolved__dot" style={{background: a.resolved === 'Yes' ? 'var(--blue-strong)' : 'var(--red-strong)'}} />
              {a.resolved} · 100¢
            </span>
            <span className={`rd-table__num ${a.error >= 0 ? 'rd-num--pos' : 'rd-num--neg'}`}>
              {a.error >= 0 ? '+' : ''}{(a.error * 100).toFixed(1)}pp
            </span>
            {density === 'analyst' && <span className="rd-table__num rd-table__num--muted">{a.n}</span>}
            {density === 'analyst' && <span className="rd-table__num">{a.brier.toFixed(3)}</span>}
            <span className="rd-bar">
              <span className="rd-bar__mid" />
              <span className={`rd-bar__fill ${a.error >= 0 ? 'rd-bar__fill--pos' : 'rd-bar__fill--neg'}`}
                    style={{ width: `${(Math.abs(a.error) / maxErr) * 50}%`, [a.error >= 0 ? 'left' : 'right']: '50%' }} />
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { ANALYST_DATA, HeroPMI, QuestionBanner, PriceDense, AnaloguesDense });

</script>
  <script type="text/babel">
/* Option A — part 2 — PMI-model edition.
   Conditional-impact panel replaces Correlations.
   ContractPickerPMI pulls from PMI_MODEL.contracts.
   ProViewAnalyst shell stitches everything together. */

// ============================================================
// ContractPickerPMI — uses PMI_MODEL
// ============================================================
function ContractPickerPMI({ value, onChange }) {
  const [open, setOpen] = React.useState(false);
  const M = window.PMI_MODEL;
  const sel = M.bySym[value];
  if (!sel) return null;
  return (
    <div className={`rd2-picker ${open ? 'is-open' : ''}`}>
      <button className="rd2-picker__btn" onClick={() => setOpen(!open)}>
        <span className="t-label" style={{color:'var(--ink-3)'}}>VIEWING</span>
        <span className="rd2-picker__cur">{sel.sym}<span style={{opacity:.5,margin:'0 6px'}}>·</span>{(sel.yes*100).toFixed(0)}% Yes</span>
        <span className="rd2-picker__caret">{open ? '▴' : '▾'}</span>
      </button>
      {open && (
        <div className="rd2-picker__menu">
          {M.contracts.map(u => (
            <button key={u.sym}
              className={`rd2-picker__item ${u.sym === value ? 'is-active' : ''}`}
              onClick={() => { onChange(u.sym); setOpen(false); }}>
              <span style={{minWidth:0}}>
                <span className="rd2-picker__sym">{u.sym} · {u.w}% PMI</span>
                <span className="rd2-picker__desc">{u.q}</span>
              </span>
              <span className="rd2-picker__edge rd2-picker__edge--yes">
                {(u.yes * 100).toFixed(0)}% Yes
              </span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// CondImpactPane — replaces Correlations
// Shows: (1) outward — when THIS resolves Yes, how it shifts every other component
//        (2) inward  — when other components resolve Yes, how they shift THIS
// ============================================================
function CondImpactPane({ sym, density }) {
  const M = window.PMI_MODEL;
  const out = M.influenceesOf(sym);
  const inn = M.influencersOf(sym);
  const maxAbs = Math.max(0.01, ...out.map(x => Math.abs(x.delta)), ...inn.map(x => Math.abs(x.delta)));

  function Row({ kind, sym: s, delta, pYes, target }) {
    const tgt = M.bySym[target || s];
    const wShare = tgt ? tgt.w / M.W : 0;
    const expected = delta * pYes;          // expected P-shift on this row's target
    const pos = delta >= 0;
    return (
      <div className="rd-cond__row">
        <span className="rd-cond__sym">
          <span className="t-body-sm" style={{fontWeight:600}}>{s}</span>
          <span className="t-label" style={{color:'var(--ink-3)'}}>
            {tgt ? tgt.q : ''}
          </span>
        </span>
        <span className="rd-cond__bar">
          <span className="rd-cond__bar-mid" />
          <span className={`rd-cond__bar-fill ${pos ? 'rd-cond__bar-fill--pos' : 'rd-cond__bar-fill--neg'}`}
                style={{width: (Math.abs(delta) / maxAbs * 50) + '%', [pos ? 'left' : 'right']: '50%'}} />
        </span>
        <span className={`rd-cond__delta ${pos ? 'rd-num--pos' : 'rd-num--neg'}`}>
          {pos ? '+' : ''}{(delta * 100).toFixed(1)}pp
        </span>
        {density === 'analyst' && (
          <span className="rd-cond__meta">
            <span style={{color:'var(--ink-3)'}}>P(trigger=Yes)</span> {(pYes * 100).toFixed(0)}%
          </span>
        )}
        {density === 'analyst' && (
          <span className="rd-cond__meta">
            <span style={{color:'var(--ink-3)'}}>PMI weight</span> {tgt ? tgt.w : 0}%
          </span>
        )}
        {density === 'analyst' && (
          <span className={`rd-cond__exp ${expected >= 0 ? 'rd-num--pos' : 'rd-num--neg'}`}>
            {expected >= 0 ? '+' : ''}{(expected * wShare * 100).toFixed(2)}pp
          </span>
        )}
      </div>
    );
  }

  return (
    <div className="rd2-pane">
      <p className="t-body" style={{color:'var(--ink-2)', maxWidth:840, margin:'0 0 var(--s-3)'}}>
        How <strong>{sym}</strong> connects to the rest of the PMI. <strong>Outward</strong>: if{' '}
        <strong>{sym}</strong> resolves Yes, every other component's Yes-probability shifts by Δpp.
        {density === 'analyst' && ' Expected contribution = Δ × P(trigger=Yes) × weight share — the PMI-score swing already priced in.'}
      </p>

      <div className="rd-cond__group">
        <div className="rd-cond__h">
          <span className="t-eyebrow">OUTWARD · {sym} → others</span>
          <span className="t-label" style={{color:'var(--ink-3)'}}>{out.length} links</span>
        </div>
        {density === 'analyst' && (
          <div className="rd-cond__row rd-cond__row--head">
            <span className="t-label">TARGET CONTRACT</span>
            <span className="t-label">SHIFT</span>
            <span className="t-label" style={{textAlign:'right'}}>Δ</span>
            <span className="t-label">P(yes)</span>
            <span className="t-label">w</span>
            <span className="t-label" style={{textAlign:'right'}}>EXP. PMI Δ</span>
          </div>
        )}
        {out.length === 0
          ? <div className="rd-cond__empty">No outward links recorded for this contract.</div>
          : out.map(x => <Row key={x.to} kind="out" sym={x.to} delta={x.delta} pYes={M.bySym[sym].yes} target={x.to} />)
        }
      </div>

      <div className="rd-cond__group">
        <div className="rd-cond__h">
          <span className="t-eyebrow">INWARD · others → {sym}</span>
          <span className="t-label" style={{color:'var(--ink-3)'}}>{inn.length} links</span>
        </div>
        {density === 'analyst' && (
          <div className="rd-cond__row rd-cond__row--head">
            <span className="t-label">TRIGGER CONTRACT</span>
            <span className="t-label">SHIFT TO {sym}</span>
            <span className="t-label" style={{textAlign:'right'}}>Δ</span>
            <span className="t-label">P(yes)</span>
            <span className="t-label">w</span>
            <span className="t-label" style={{textAlign:'right'}}>EXP. Δ ON {sym}</span>
          </div>
        )}
        {inn.length === 0
          ? <div className="rd-cond__empty">No inward links recorded for this contract.</div>
          : inn.map(x => <Row key={x.from} kind="in" sym={x.from} delta={x.delta} pYes={x.pYes} target={sym} />)
        }
      </div>
    </div>
  );
}

// ============================================================
// CalibDense — keep Brier-by-venue but headline reframed
// ============================================================
function CalibDense({ density }) {
  const { calCategories: cats, calExchanges: exs, calibration: m } = window.RESEARCH_DATA;
  const rel = window.ANALYST_DATA.reliability;
  return (
    <div className="rd2-pane">
      <p className="t-body" style={{color:'var(--ink-2)', maxWidth:820, margin:'0 0 var(--s-3)'}}>
        Brier score by venue × category — lower = better. The aggregate score across all components feeds
        Micah's confidence weight when blending Yes-probabilities into the PMI.
      </p>
      <div className="rd-cal-grid">
        <div className="rd-heatmap">
          <div className="rd-heatmap__row rd-heatmap__row--head">
            <span></span>
            {cats.map(c => <span key={c} className="rd-heatmap__hcell t-label">{c}</span>)}
            {density === 'analyst' && <span className="rd-heatmap__hcell t-label">n</span>}
            {density === 'analyst' && <span className="rd-heatmap__hcell t-label">LogLoss</span>}
          </div>
          {exs.map((e, ei) => (
            <div key={e} className="rd-heatmap__row">
              <span className="rd-heatmap__rowlabel">
                <ExchangeChip id={e} size={18} />
                <span className="t-body-sm" style={{fontWeight:600}}>{window.MICAH.exchanges[e].name}</span>
              </span>
              {cats.map(c => {
                const v = m[e][c];
                const bg = brierFill(v);
                const isLight = v > 0.13 && v < 0.22;
                return (
                  <span key={c} className="rd-heatmap__cell" style={{background:bg, color:isLight?'var(--ink-1)':'#FBFAF6'}}>
                    {v.toFixed(2)}
                  </span>
                );
              })}
              {density === 'analyst' && <span className="rd-heatmap__cell rd-heatmap__cell--num">{Math.round(180 + ei * 41 + Math.sin(ei) * 30)}</span>}
              {density === 'analyst' && <span className="rd-heatmap__cell rd-heatmap__cell--num">{(0.31 + Math.cos(ei) * 0.05).toFixed(2)}</span>}
            </div>
          ))}
        </div>
        {density === 'analyst' && (
          <div className="rd-reliability">
            <div className="t-label" style={{marginBottom:8}}>RELIABILITY DIAGRAM · ALL POLITICS</div>
            <svg viewBox="0 0 320 320" className="rd-reliability__svg">
              <line x1={20} y1={300} x2={300} y2={20} stroke="#11192C" strokeDasharray="4 3" opacity=".4" />
              {[0, 0.25, 0.5, 0.75, 1].map(t => (
                <g key={t}>
                  <line x1={20 + t * 280} x2={20 + t * 280} y1={20} y2={300} stroke="#E1DCD0" />
                  <line x1={20} x2={300} y1={300 - t * 280} y2={300 - t * 280} stroke="#E1DCD0" />
                </g>
              ))}
              {rel.map((p, i) => (
                <circle key={i} cx={20 + p.bin * 280} cy={300 - p.observed * 280}
                        r={Math.sqrt(p.n) * 0.6} fill="#1A3FA8" fillOpacity=".5" stroke="#1A3FA8" strokeWidth="1.2" />
              ))}
              <text x={160} y={316} fontSize="10" fill="#6B7180" textAnchor="middle" fontFamily="Inter">predicted P(Yes)</text>
              <text x={8} y={160} fontSize="10" fill="#6B7180" textAnchor="middle" fontFamily="Inter" transform="rotate(-90 8 160)">observed frequency</text>
            </svg>
            <p className="t-body-sm" style={{color:'var(--ink-3)', marginTop:8}}>
              Bubble = n contracts in bin. Diagonal = perfect calibration.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// VenuesDense — same decomposition, now Yes-side prices
// ============================================================
function VenuesDense({ sym, density }) {
  const c = window.PMI_MODEL.bySym[sym];
  const base = c.yes;
  const rows = [
    { exc: 'polymarket', price: base + 0.003, weight: 38, vol: '$4.2M', confidence: 'high' },
    { exc: 'kalshi',     price: base - 0.001, weight: 26, vol: '$2.8M', confidence: 'high' },
    { exc: 'robinhood',  price: base + 0.001, weight: 14, vol: '$870K', confidence: 'med'  },
    { exc: 'manifold',   price: base - 0.005, weight:  9, vol: '$220K', confidence: 'low'  },

  <script type="text/babel">
/* Option B — Research Desk · PMI SIMULATOR
   Drag any contract's P(Yes) and watch the PMI score recompute,
   with the conditional cascade propagating through dependent components. */

const { useState: sState, useMemo: sMemo } = React;

// ============================================================
// Scenario math
// ============================================================

/* Effective weight ε_i = (w_i + Σ_j w_j × cond[i][j]) / W.
   When P(yesᵢ) shifts by Δp, PMI score shifts by ε_i × Δp. */
function effectiveWeights() {
  const M = window.PMI_MODEL;
  const out = {};
  for (const c of M.contracts) {
    let extra = 0;
    const links = M.cond[c.sym] || {};
    for (const [j, d] of Object.entries(links)) {
      const wj = M.bySym[j]?.w || 0;
      extra += wj * d;
    }
    out[c.sym] = (c.w + extra) / M.W;
  }
  return out;
}

function pmiFromBeliefs(beliefs) {
  const M = window.PMI_MODEL;
  // PMI = Σ_i (w_i/W) × p_i + Σ_i Σ_j (w_j/W) × p_i × cond[i][j]
  let naive = 0;
  let condAdj = 0;
  for (const c of M.contracts) {
    const p = beliefs[c.sym];
    naive += (c.w / M.W) * p;
    const links = M.cond[c.sym] || {};
    for (const [j, d] of Object.entries(links)) {
      const wj = M.bySym[j]?.w || 0;
      condAdj += (wj / M.W) * p * d;
    }
  }
  return { naive, condAdj, total: naive + condAdj };
}

/* Linearised cascade — induced P(j) given user's beliefs about everyone else.
   induced_j = belief_j + Σ_{a≠j} (belief_a - base_a) × cond[a][j]. */
function inducedProb(sym, beliefs) {
  const M = window.PMI_MODEL;
  const base = M.bySym[sym].yes;
  let bump = 0;
  for (const [a, links] of Object.entries(M.cond)) {
    if (a === sym) continue;
    const d = links[sym];
    if (d === undefined) continue;
    bump += d * ((beliefs[a] ?? M.bySym[a].yes) - M.bySym[a].yes);
  }
  return Math.max(0, Math.min(1, (beliefs[sym] ?? base) + bump));
}

// ============================================================
// PMI Simulator
// ============================================================
function TabSimulator() {
  const M = window.PMI_MODEL;
  const base = sMemo(() => Object.fromEntries(M.contracts.map(c => [c.sym, c.yes])), []);
  const [beliefs, setBeliefs] = sState(base);
  const [activePreset, setActivePreset] = sState('reset');

  const eff = sMemo(effectiveWeights, []);
  const basePMI = sMemo(() => pmiFromBeliefs(base), [base]);
  const scenPMI = sMemo(() => pmiFromBeliefs(beliefs), [beliefs]);
  const deltaPMI = scenPMI.total - basePMI.total;

  // Sort contracts by absolute deviation for the diff chart
  const sortedDiff = M.contracts
    .map(c => {
      const p = beliefs[c.sym];
      const dp = p - c.yes;
      return { sym: c.sym, q: c.q, w: c.w, base: c.yes, p, dp, contrib: dp * eff[c.sym] };
    })
    .sort((a, b) => Math.abs(b.contrib) - Math.abs(a.contrib));

  function setOne(sym, val) {
    setBeliefs({ ...beliefs, [sym]: val });
    setActivePreset('custom');
  }
  function applyPreset(name) {
    setActivePreset(name);
    const next = { ...base };
    if (name === 'reset') {
      // no change
    } else if (name === 'gop-sweep') {
      next['TX-GOV-26']  = 0.95;
      next['FL-GOV-26']  = 0.95;
      next['GOP-HOUSE']  = 0.93;
      next['MAGA-EO']    = 0.88;
      next['MI-GOV-26']  = 0.20;
    } else if (name === 'recession') {
      next['REC-Q4-26']  = 0.85;
      next['FED-50-OCT'] = 0.78;
      next['BTC-100K']   = 0.35;
      next['WTI-90']     = 0.18;
      next['GOP-HOUSE']  = 0.42;
    } else if (name === 'dem-comeback') {
      next['TX-GOV-26']  = 0.55;
      next['FL-GOV-26']  = 0.50;
      next['MI-GOV-26']  = 0.82;
      next['GOP-HOUSE']  = 0.28;
      next['GA-3P-26']   = 0.40;
    }
    setBeliefs(next);
  }

  const dirty = JSON.stringify(beliefs) !== JSON.stringify(base);
  const presets = [
    { id: 'reset',        label: 'Status quo' },
    { id: 'gop-sweep',    label: 'GOP sweep' },
    { id: 'recession',    label: 'Recession arrives' },
    { id: 'dem-comeback', label: 'Democratic comeback' },
  ];

  return (
    <div className="rd2-pane">
      {/* ===== PMI summary band ===== */}
      <div className="sim-summary">
        <div className="sim-summary__cell">
          <div className="t-label">Base PMI</div>
          <div className="sim-summary__v">{(basePMI.total * 100).toFixed(2)}</div>
          <div className="t-label" style={{color:'var(--ink-3)'}}>
            naive {(basePMI.naive * 100).toFixed(2)} · cond {basePMI.condAdj >= 0 ? '+' : ''}{(basePMI.condAdj * 100).toFixed(2)}
          </div>
        </div>
        <div className="sim-summary__cell sim-summary__cell--scen">
          <div className="t-label">Scenario PMI</div>
          <div className="sim-summary__v">{(scenPMI.total * 100).toFixed(2)}</div>
          <div className="t-label" style={{color:'var(--ink-3)'}}>
            naive {(scenPMI.naive * 100).toFixed(2)} · cond {scenPMI.condAdj >= 0 ? '+' : ''}{(scenPMI.condAdj * 100).toFixed(2)}
          </div>
        </div>
        <div className={`sim-summary__cell sim-summary__cell--delta sim-summary__cell--${deltaPMI >= 0 ? 'pos' : 'neg'}`}>
          <div className="t-label">Δ PMI</div>
          <div className="sim-summary__v">
            {deltaPMI >= 0 ? '+' : ''}{(deltaPMI * 100).toFixed(2)}<span style={{fontSize:14, fontWeight:500, marginLeft:4}}>pp</span>
          </div>
          <div className="t-label" style={{color:'var(--ink-3)'}}>vs base · {dirty ? 'scenario active' : 'no change'}</div>
        </div>
        <div className="sim-summary__cell">
          <div className="t-label">Scenario</div>
          <div className="sim-summary__v sim-summary__v--small">
            {presets.find(p => p.id === activePreset)?.label || 'Custom'}
          </div>
          <div className="t-label" style={{color:'var(--ink-3)'}}>
            {sortedDiff.filter(d => Math.abs(d.dp) > 0.001).length} contracts shifted
          </div>
        </div>
      </div>

      {/* ===== Presets row ===== */}
      <div className="sim-presets">
        <span className="t-label" style={{color:'var(--ink-3)'}}>PRESETS</span>
        {presets.map(p => (
          <button key={p.id}
            className={`sim-preset ${activePreset === p.id ? 'is-active' : ''}`}
            onClick={() => applyPreset(p.id)}>
            {p.label}
          </button>
        ))}
        <button className="sim-preset sim-preset--ghost" onClick={() => { setBeliefs(base); setActivePreset('reset'); }}>
          ↺ Reset
        </button>
      </div>

      {/* ===== Body: sliders + cascade ===== */}
      <div className="sim-body">
        {/* ===== Sliders ===== */}
        <div className="sim-sliders">
          <div className="sim-sliders__head">
            <span></span>
            <span className="t-label">SCENARIO P(Yes)</span>
            <span className="t-label" style={{textAlign:'right'}}>ε</span>
            <span className="t-label" style={{textAlign:'right'}}>Δ to PMI</span>
          </div>
          {M.contracts.map(c => {
            const p = beliefs[c.sym];
            const induced = inducedProb(c.sym, beliefs);
            const dp = p - c.yes;
            const contribOwn = dp * eff[c.sym];
            const cascadeIn = induced - p;  // shift coming FROM other components
            const links = M.cond[c.sym] || {};
            const linkSyms = Object.keys(links);

            return (
              <div key={c.sym} className={`sim-row ${Math.abs(dp) > 0.001 ? 'is-dirty' : ''}`}>
                <div className="sim-row__head">
                  <div className="sim-row__sym">
                    <span style={{fontWeight:700}}>{c.sym}</span>
                    <span style={{color:'var(--ink-3)', marginLeft:8}}>w {c.w}%</span>
                  </div>
                  <div className="sim-row__q">{c.q}</div>
                </div>

                <div className="sim-row__slider">
                  <span className="sim-row__yesno-l">No</span>
                  <span className="sim-row__track">
                    {/* Base marker */}
                    <span className="sim-row__base" style={{left: (c.yes * 100) + '%'}} title={`base ${(c.yes * 100).toFixed(0)}%`} />
                    {/* Induced marker (shows where cascade pushed it) */}
                    {Math.abs(cascadeIn) > 0.005 && (
                      <span className="sim-row__induced" style={{left: (induced * 100) + '%'}}
                            title={`cascade-induced ${(induced * 100).toFixed(1)}%`} />
                    )}
                    <input type="range" min={0} max={1} step={0.005}
                           value={p}
                           onChange={e => setOne(c.sym, parseFloat(e.target.value))} />
                    <span className="sim-row__fill" style={{width: (p * 100) + '%'}} />
                  </span>
                  <span className="sim-row__yesno-r">Yes</span>
                </div>

                <div className="sim-row__readout">
                  <span className="sim-row__p">
                    <strong>{(p * 100).toFixed(0)}%</strong>
                    <span style={{color:'var(--ink-3)', fontSize:11, marginLeft:6}}>
                      vs base {(c.yes * 100).toFixed(0)}%
                      {Math.abs(dp) > 0.001 && (
                        <span className={dp > 0 ? 'rd-num--pos' : 'rd-num--neg'} style={{marginLeft:4, fontWeight:600}}>
                          {dp > 0 ? '+' : ''}{(dp * 100).toFixed(0)}pp
                        </span>
                      )}
                    </span>
                  </span>
                </div>

                <div className="sim-row__eps">{(eff[c.sym] * 100).toFixed(1)}%</div>

                <div className={`sim-row__contrib ${contribOwn >= 0 ? 'rd-num--pos' : 'rd-num--neg'}`}>
                  {Math.abs(contribOwn) < 0.0001 ? '—' :
                    (contribOwn >= 0 ? '+' : '') + (contribOwn * 100).toFixed(2) + 'pp'}
                </div>

                {/* Cascade reveal — only show when this contract is moved OR when others are pushing it */}
                {(Math.abs(dp) > 0.001 || Math.abs(cascadeIn) > 0.005) && linkSyms.length > 0 && (
                  <div className="sim-row__cascade">
                    <span className="t-label" style={{color:'var(--ink-3)'}}>CASCADE FROM {c.sym} →</span>
                    {linkSyms.map(j => {
                      const delta = links[j];
                      const induceJ = delta * dp;
                      return (
                        <span key={j} className="sim-cascade-pill">
                          {j}
                          <span className={induceJ >= 0 ? 'rd-num--pos' : 'rd-num--neg'} style={{marginLeft:6, fontWeight:600}}>
                            {induceJ >= 0 ? '+' : ''}{(induceJ * 100).toFixed(1)}pp
                          </span>
                        </span>
                      );
                    })}
                  </div>
                )}

                {Math.abs(cascadeIn) > 0.005 && (
                  <div className="sim-row__cascade sim-row__cascade--in">
                    <span className="t-label" style={{color:'var(--ink-3)'}}>INDUCED ON {c.sym} BY OTHERS</span>
                    <span className={`sim-cascade-induced ${cascadeIn >= 0 ? 'rd-num--pos' : 'rd-num--neg'}`}>
                      {cascadeIn >= 0 ? '+' : ''}{(cascadeIn * 100).toFixed(1)}pp → induced {(induced * 100).toFixed(1)}%
                    </span>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* ===== Waterfall of contributions to ΔPMI ===== */}
        <div className="sim-waterfall">
          <div className="t-label" style={{marginBottom:12}}>WATERFALL · ΔPMI BY CONTRACT</div>
          <p className="t-body-sm" style={{color:'var(--ink-3)', marginTop:0, marginBottom:'var(--s-4)'}}>
            Each bar = Δp(yes) × effective weight ε. Bars sum to total ΔPMI.
            ε already absorbs the conditional propagation, so moving one slider gives you the full cascade-aware impact.
          </p>
          {sortedDiff.map(d => {
            const maxAbs = Math.max(0.001, ...sortedDiff.map(x => Math.abs(x.contrib)));
            const pct = Math.abs(d.contrib) / maxAbs * 50;
            const pos = d.contrib >= 0;
            return (
              <div key={d.sym} className="sim-wf__row">
                <span className="sim-wf__sym">{d.sym}</span>
                <span className="sim-wf__bar">
                  <span className="sim-wf__mid" />
                  {Math.abs(d.contrib) > 0.0001 && (
                    <span className={`sim-wf__fill ${pos ? 'sim-wf__fill--pos' : 'sim-wf__fill--neg'}`}
                          style={{width: pct + '%', [pos ? 'left' : 'right']: '50%'}} />
                  )}
                </span>
                <span className={`sim-wf__v ${pos ? 'rd-num--pos' : 'rd-num--neg'}`}>
                  {Math.abs(d.contrib) < 0.00005 ? '—' :
                    (pos ? '+' : '') + (d.contrib * 100).toFixed(2)}
                </span>
              </div>
            );
          })}
          <div className="sim-wf__total">
            <span>TOTAL Δ PMI</span>
            <span className={`sim-wf__v ${deltaPMI >= 0 ? 'rd-num--pos' : 'rd-num--neg'}`}>
              {deltaPMI >= 0 ? '+' : ''}{(deltaPMI * 100).toFixed(2)}pp
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}
