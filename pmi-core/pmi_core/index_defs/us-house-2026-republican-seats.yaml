# US House 2026 — projected Republican seat *count* (#).
#
# Status: `formula: seat_projection_sum` is implemented (see the senate-seats
# variant header). NOTE: seat collapse currently recognises per-state *Senate*
# races only (seat_mapping.parse_seat_race), so until a House-district extractor
# lands this index returns score=None — the aggregator degrades honestly rather
# than feeding 435 unmatched markets to the Poisson-binomial. Tracked alongside
# CORR-1.3.

id: us-house-2026-republican-seats
version: 3  # v3 (ab03bd3): status header rewritten when seat_projection_sum landed — content changed, so SCD2 requires a new version (yaml_sha256 is over the whole file, comments included). v2 (CORR-1.2): added aggregation.seat_projection chamber geometry
title: "US House 2026 — Projected Republican Seats (#)"
owner: reid

selectors:
  - type: keyword
    terms:
      - "House"
      - "Representative"
      - "Congress"
      - "2026 House"
      - "U.S. House"
  - type: category
    polymarket_tag: "politics"

factors:
  - id: is_house_race_2026
    type: binary
    prompt_ref: prompts/factors/is-house-race-2026-v1
    weight: 60
  - id: republican_on_yes
    type: binary
    prompt_ref: prompts/factors/republican-on-yes-v1
    weight: 40

weighting:
  liquidity:
    method: none

aggregation:
  collapse:
    enabled: true
    max_spread_days: 30
    representative: max_probability
  min_components: 1
  formula: seat_projection_sum
  # CORR-1.2 — the House is the natural zero-holdover case: all 435 seats are
  # up every cycle, so there is no holdover and the whole chamber is contested.
  seat_projection:
    total_seats: 435
    majority_threshold: 218
    holdover_r: 0
    holdover_d: 0

publish:
  cadence: every_2h
  channels: [api]
