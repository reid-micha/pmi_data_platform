# US Senate 2026 — projected Republican seat *count* (#).
#
# Status: `formula: seat_projection_sum` IS implemented in
# pmi_core/engine/aggregator.py::_seat_projection_aggregate. The score is the
# expected Republican seat count E[R seats] (NOT a 0..100 index): component
# markets collapse to one P(R wins) per state via seat_mapping.
# extract_contested_seats, then the CORR-1.6 Poisson-binomial distribution
# folds in the holdover geometry below. This is the exact path the
# /senate-board endpoint uses, so the top-line score and the board agree.
#
# Pair with `us-senate-2026-republican-share.yaml` for the share variant.

id: us-senate-2026-republican-seats
version: 3  # v3 (ab03bd3): status header rewritten when seat_projection_sum landed — content changed, so SCD2 requires a new version (yaml_sha256 is over the whole file, comments included). v2 (CORR-1.2): added aggregation.seat_projection chamber geometry
title: "US Senate 2026 — Projected Republican Seats (#)"
owner: reid

selectors:
  - type: keyword
    terms:
      - "Senate"
      - "Senator"
      - "2026 Senate"
      - "U.S. Senate"
  - type: category
    polymarket_tag: "politics"

factors:
  - id: is_senate_race_2026
    type: binary
    prompt_ref: prompts/factors/is-senate-race-2026-v1
    weight: 60
  - id: republican_on_yes
    type: binary
    prompt_ref: prompts/factors/republican-on-yes-v1
    weight: 40

weighting:
  liquidity:
    method: none   # seat *count* doesn't get liquidity-weighted: each seat counts once

aggregation:
  collapse:
    enabled: true
    max_spread_days: 30
    representative: max_probability
  min_components: 1
  formula: seat_projection_sum
  # CORR-1.2 — chamber geometry for the balance-of-power board.
  # Senate = 100 seats = 33 contested (Class II, on the 2026 ballot) +
  # 67 holdover (Class I + III, not up). The holdover split below is an
  # APPROXIMATION of the current roster and should be verified against the
  # actual Class I/III seat holders before this index is published.
  # NOTE: the demo market fixtures contain only a handful of the ~33 Class II
  # races, so E[R seats] from a dev seed will read low until real ingest
  # (CORR-1.3) supplies the full contested set.
  seat_projection:
    total_seats: 100
    majority_threshold: 51
    holdover_r: 30
    holdover_d: 37

publish:
  cadence: every_2h
  channels: [api]
