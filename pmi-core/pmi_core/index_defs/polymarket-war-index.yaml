# Polymarket War Index — P0 definition.
# Mirrors Micah's 8-factor war index but Polymarket-only.
# This is THE only PMI shipped at P0; multiple indexes start at P1 (DSL parser GA).

id: polymarket-war-index
version: 1
title: "Polymarket War Index"
owner: reid

selectors:
  - type: keyword
    terms:
      - war
      - invasion
      - conflict
      - ceasefire
      - troop
      - "armed forces"
      - military
      - missile
      - strike
      - "nuclear weapon"
  - type: category
    polymarket_tag: "geopolitics"

factors:
  - id: direction
    type: ternary
    prompt_ref: prompts/factors/direction-v1
    weight: null              # direction does not participate in relevancy
  - id: directly_about_war
    type: binary
    prompt_ref: prompts/factors/directly_about_war-v1
    weight: 30
  - id: armed_conflict
    type: binary
    prompt_ref: prompts/factors/armed_conflict-v1
    weight: 20
  - id: state_actor
    type: binary
    prompt_ref: prompts/factors/state_actor-v1
    weight: 15
  - id: kinetic_action
    type: binary
    prompt_ref: prompts/factors/kinetic_action-v1
    weight: 15
  - id: near_term
    type: binary
    prompt_ref: prompts/factors/near_term-v1
    weight: 10
  - id: high_severity
    type: binary
    prompt_ref: prompts/factors/high_severity-v1
    weight: 10

weighting:
  liquidity:
    method: quantile

aggregation:
  collapse:
    enabled: true
    max_spread_days: 30
    representative: max_probability
  min_components: 1                # P0: relax so demo runs with sparse data
  formula: weighted_average_x_100

publish:
  cadence: every_2h
  channels: [api]
