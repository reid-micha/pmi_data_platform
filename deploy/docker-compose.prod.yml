# ════════════════════════════════════════════════════════════════════════════
# Single-EC2 production stack for the Polymarket PMI Platform.
#
# Differs from the workspace-root dev compose (../../docker-compose.yml):
#   • Services run from SHA-pinned GHCR images (built by
#     .github/workflows/build-images.yml), NOT local `build:` contexts.
#   • Only pmi_core is bind-mounted (read-only) from the same-SHA git checkout;
#     the image carries deps + service code. Keep the git checkout and IMAGE_TAG
#     on the same commit so lineage stays clean.
#   • Caddy terminates TLS (auto Lets Encrypt) for 3 subdomains.
#   • Postgres data lives on the gp3 EBS volume (PMI_DATA_DIR).
#   • MLflow artifacts go to S3; logs go to CloudWatch via the awslogs driver.
#
# Bring up:  cd /opt/pmi/app/deploy && docker compose -f docker-compose.prod.yml --env-file .env up -d
# Image tag/owner come from .env: IMAGE_REGISTRY / IMAGE_OWNER / IMAGE_TAG.
# ════════════════════════════════════════════════════════════════════════════

# CloudWatch Logs driver shared by every container (SHIP-5.1). The instance IAM
# role must allow logs:CreateLogStream + logs:PutLogEvents on the group below.
x-awslogs: &awslogs
  driver: awslogs
  options:
    awslogs-region: ${AWS_REGION:-us-east-1}
    awslogs-group: ${AWS_LOG_GROUP:-/pmi/prod}
    awslogs-create-group: "true"

# Shared base for the pmi_core-dependent Python services (api / workers / ingest).
x-pmi-core-mount: &pmi-core-mount
  - ../pmi-core/pmi_core:/app/pmi_core:ro

x-pmi-ingest-base: &pmi-ingest-base
  image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:?set IMAGE_OWNER in .env}/pmi-ingest:${IMAGE_TAG:-latest}
  restart: unless-stopped
  logging: *awslogs
  dns:
    - 1.1.1.1
    - 8.8.8.8
  depends_on:
    postgres:
      condition: service_healthy
  env_file:
    - .env
  environment:
    PMI_DB_HOST: postgres
    PMI_MLFLOW_TRACKING_URI: http://mlflow:5000
  volumes:
    - ../pmi-core/pmi_core:/app/pmi_core:ro
    - ./kalshi.key:/app/kalshi.key:ro

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pmi-postgres
    restart: unless-stopped
    logging: *awslogs
    environment:
      POSTGRES_USER: ${PMI_DB_USER:-warindex}
      POSTGRES_PASSWORD: ${PMI_DB_PASSWORD:?set PMI_DB_PASSWORD in .env}
      POSTGRES_DB: ${PMI_DB_NAME:-pmi}
    volumes:
      # Data on the gp3 EBS volume mounted at PMI_DATA_DIR (default /mnt/data).
      - ${PMI_DATA_DIR:-/mnt/data}/pgdata:/var/lib/postgresql/data
      # First-boot init: extensions on the pmi DB + create the mlflow DB.
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PMI_DB_USER:-warindex} -d ${PMI_DB_NAME:-pmi}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mlflow:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER}/mlflow:${IMAGE_TAG:-latest}
    container_name: pmi-mlflow
    restart: unless-stopped
    logging: *awslogs
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${PMI_DB_USER:-warindex}:${PMI_DB_PASSWORD}@postgres:5432/mlflow
      # S3 artifact store (SHIP-1.4 replacement). Bucket from .env; creds come
      # from the instance IAM role via IMDS (boto3 picks them up automatically).
      MLFLOW_ARTIFACTS_DESTINATION: s3://${MLFLOW_S3_BUCKET:?set MLFLOW_S3_BUCKET}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  pmi-api:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER}/pmi-api:${IMAGE_TAG:-latest}
    container_name: pmi-api
    restart: unless-stopped
    logging: *awslogs
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PMI_DB_HOST: postgres
      PMI_MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes: *pmi-core-mount

  pmi-workers:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER}/pmi-workers:${IMAGE_TAG:-latest}
    container_name: pmi-workers
    restart: unless-stopped
    logging: *awslogs
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PMI_DB_HOST: postgres
      PMI_MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ../pmi-core/pmi_core:/app/pmi_core:ro
      - ../pmi-workers/cron:/app/cron:ro

  # ── Ingest: one long-lived container per live source ────────────────────────
  pmi-ingest:
    <<: *pmi-ingest-base
    container_name: pmi-ingest
    command: ["run", "--source", "polymarket-rest"]

  pmi-ingest-clob:
    <<: *pmi-ingest-base
    container_name: pmi-ingest-clob
    command: ["clob"]

  pmi-ingest-history:
    <<: *pmi-ingest-base
    container_name: pmi-ingest-history
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "while true; do python -m pmi_ingest.cli polymarket-history || true; sleep 86400; done"

  pmi-ingest-kalshi-rest:
    <<: *pmi-ingest-base
    container_name: pmi-ingest-kalshi-rest
    command: ["run", "--source", "kalshi-rest"]

  pmi-ingest-kalshi-clob:
    <<: *pmi-ingest-base
    container_name: pmi-ingest-kalshi-clob
    command: ["kalshi-clob"]

  pmi-web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER}/pmi-web:${IMAGE_TAG:-latest}
    container_name: pmi-web
    restart: unless-stopped
    logging: *awslogs
    depends_on:
      pmi-api:
        condition: service_started
    env_file:
      - .env
    environment:
      # Server-side fetch hits pmi-api over the compose network. The browser
      # base (NEXT_PUBLIC_PMI_API_URL) was baked at image build time.
      PMI_API_URL: http://pmi-api:8000

  caddy:
    image: caddy:2-alpine
    container_name: pmi-caddy
    restart: unless-stopped
    logging: *awslogs
    depends_on:
      - pmi-web
      - pmi-api
      - mlflow
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      PMI_DOMAIN: ${PMI_DOMAIN:?set PMI_DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
      MLFLOW_BASICAUTH_USER: ${MLFLOW_BASICAUTH_USER:-admin}
      MLFLOW_BASICAUTH_HASH: ${MLFLOW_BASICAUTH_HASH:?run `caddy hash-password` and set MLFLOW_BASICAUTH_HASH}

volumes:
  caddy-data:
    name: pmi-caddy-data
  caddy-config:
    name: pmi-caddy-config
